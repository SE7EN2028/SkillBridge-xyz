upstream skillbridge_app {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.skillbridge.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.skillbridge.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.skillbridge.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.skillbridge.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 6M;
    gzip on;
    gzip_types application/json text/plain;

    location / {
        proxy_pass         http://skillbridge_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }
}
